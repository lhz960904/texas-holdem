<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chip Animation Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080f08; font-family:-apple-system,sans-serif; color:#fff; overflow:hidden; height:100vh; }

/* Table */
.table-container { position:relative; width:100%; height:75vh; }
.felt {
  position:absolute; top:6%; left:6%; right:6%; bottom:4%;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at center, #1e6b3a 0%, #145228 50%, #0d3a1c 100%);
  border-radius:50%; border:10px solid #3a2510;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.4), 0 0 0 4px #2a1a08, 0 0 60px rgba(0,0,0,0.6);
}
.felt::before { content:''; position:absolute; inset:12px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.06); }

/* Pot */
.pot { position:absolute; top:28%; left:50%; transform:translateX(-50%); z-index:10;
  padding:6px 20px; border-radius:20px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,215,0,0.3);
  font-size:15px; color:#ffd700; font-weight:700; letter-spacing:1px; transition: all 0.3s;
}

/* Community cards */
.community { position:absolute; top:40%; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:10; }
.card { width:44px; height:64px; border-radius:6px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; font-weight:700; box-shadow:2px 3px 10px rgba(0,0,0,0.5); }
.card.up { background:linear-gradient(145deg,#fff,#f4f4f4); }
.card.up.red { color:#d32f2f; }
.card.up.black { color:#1a1a2e; }
.card.down { background:linear-gradient(145deg,#1a2d5a,#0d1a3a); border:1px solid #2a4080; }
.card .rank { font-size:15px; }
.card .suit { font-size:13px; margin-top:-2px; }

/* Player */
.player { position:absolute; text-align:center; transform:translate(-50%,-50%); z-index:5; }
.avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:22px; margin:0 auto; border:2px solid rgba(255,255,255,0.3); }
.player-name { font-size:11px; margin-top:3px; text-shadow:0 1px 3px rgba(0,0,0,0.8); }
.player-chips-text { font-size:10px; color:#ffd700; font-weight:600; }
.player.active .avatar { box-shadow:0 0 0 3px #ffd700, 0 0 20px rgba(255,215,0,0.4);
  animation: pulseRing 1.5s ease-in-out infinite; }
.player-cards { display:flex; gap:2px; justify-content:center; margin-bottom:4px; }
.player-cards .card { width:32px; height:44px; }
.player-cards .card .rank { font-size:11px; }
.player-cards .card .suit { font-size:10px; }

@keyframes pulseRing {
  0%,100% { box-shadow:0 0 0 3px #ffd700, 0 0 15px rgba(255,215,0,0.3); }
  50% { box-shadow:0 0 0 3px #ffd700, 0 0 25px rgba(255,215,0,0.5); }
}

/* ====== CHIP SYSTEM ====== */

/* Single chip */
.chip {
  width:22px; height:22px; border-radius:50%; position:absolute;
  border:2.5px dashed rgba(255,255,255,0.5);
  box-shadow: 0 1px 0 rgba(0,0,0,0.3), 0 2px 0 rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}
.chip.gold { background:linear-gradient(135deg,#ffd700,#ff8c00); }
.chip.black { background:#2c3e50; }
.chip.green { background:#27ae60; }
.chip.red { background:#c0392b; }
.chip.blue { background:#2980b9; }

/* Bet area — chips scattered between player and center */
.bet-area {
  position:absolute; transform:translate(-50%,-50%); z-index:8;
  width:60px; height:40px;
}
.bet-area .chip-group { position:relative; width:100%; height:100%; }
.bet-amount { position:absolute; bottom:-16px; left:50%; transform:translateX(-50%);
  font-size:11px; color:#ffd700; font-weight:700; white-space:nowrap;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

/* ====== ANIMATIONS ====== */

/* Chip slides from player to bet area */
@keyframes chipPushOut {
  0% { transform: translate(var(--from-x,0), var(--from-y,0)) scale(1.3); opacity:0.4; }
  60% { opacity:1; }
  100% { transform: translate(0,0) scale(1); opacity:1; }
}

/* All bet chips slide to pot center on phase change */
@keyframes chipsToPot {
  0% { transform: translate(0,0) scale(1); opacity:1; }
  100% { transform: translate(var(--to-pot-x,0), var(--to-pot-y,0)) scale(0.5); opacity:0; }
}

/* Pot chips fly to winner */
@keyframes chipsToWinner {
  0% { transform: translate(0,0) scale(1); opacity:1; }
  40% { transform: translate(calc(var(--to-winner-x,0) * 0.3), calc(var(--to-winner-y,0) * 0.5)) scale(1.2); opacity:1; }
  100% { transform: translate(var(--to-winner-x,0), var(--to-winner-y,0)) scale(0.6); opacity:0; }
}

/* Winner celebration glow */
@keyframes winnerGlow {
  0% { box-shadow: 0 0 0 3px #ffd700, 0 0 20px rgba(255,215,0,0.3); }
  25% { box-shadow: 0 0 0 5px #ffd700, 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,215,0,0.2); }
  50% { box-shadow: 0 0 0 3px #ffd700, 0 0 30px rgba(255,215,0,0.5); }
  75% { box-shadow: 0 0 0 6px #ffd700, 0 0 50px rgba(255,215,0,0.7), 0 0 100px rgba(255,215,0,0.3); }
  100% { box-shadow: 0 0 0 3px #ffd700, 0 0 20px rgba(255,215,0,0.3); }
}

/* Flying chip particles for win */
@keyframes chipRain {
  0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; }
  100% { transform: translate(var(--rain-x,0), var(--rain-y,-200px)) rotate(var(--rain-rot,360deg)) scale(0.3); opacity:0; }
}

.bet-area.pushing .chip { animation: chipPushOut 0.5s ease-out both; }
.bet-area.to-pot .chip-group { animation: chipsToPot 0.6s ease-in both; }
.pot.collecting { animation: chipsToWinner 0.8s ease-in-out both; }
.player.winner .avatar { animation: winnerGlow 1.5s ease-in-out 2; }

/* Chip rain particles */
.chip-particle {
  position:absolute; width:16px; height:16px; border-radius:50%;
  border:2px dashed rgba(255,255,255,0.4);
  animation: chipRain 1.2s ease-out both;
}

/* Controls */
.controls {
  position:fixed; bottom:0; left:0; right:0; height:25vh;
  background:rgba(0,0,0,0.9); border-top:1px solid rgba(255,255,255,0.1);
  display:flex; align-items:center; justify-content:center; gap:12px; padding:0 20px;
}
.btn {
  padding:10px 24px; border-radius:10px; font-size:14px; font-weight:700;
  cursor:pointer; border:none; transition:all 0.2s;
}
.btn:hover { transform:scale(1.05); }
.btn:active { transform:scale(0.95); }
.btn-call { background:#2563eb; color:#fff; }
.btn-raise { background:linear-gradient(135deg,#ffd700,#ff8c00); color:#000; }
.btn-fold { background:#555; color:#ccc; }
.btn-allin { background:linear-gradient(135deg,#ef4444,#b91c1c); color:#fff; }
.btn-reset { background:#333; color:#aaa; border:1px solid #555; }

.step-label {
  position:fixed; top:10px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.8); padding:6px 20px; border-radius:20px;
  font-size:13px; color:#ffd700; z-index:100; border:1px solid rgba(255,215,0,0.2);
  transition: all 0.3s;
}
</style>
</head>
<body>

<div class="step-label" id="stepLabel">点击按钮开始演示</div>

<div class="table-container">
  <div class="felt"></div>

  <!-- Pot -->
  <div class="pot" id="pot" style="opacity:0;">POT 0</div>

  <!-- Community cards -->
  <div class="community" id="community"></div>

  <!-- Player 1 (self, bottom) -->
  <div class="player active" id="p1" style="top:78%; left:50%;">
    <div class="player-cards">
      <div class="card up red" style="transform:rotate(-3deg);"><span class="rank">A</span><span class="suit">♥</span></div>
      <div class="card up black" style="transform:rotate(3deg);"><span class="rank">K</span><span class="suit">♠</span></div>
    </div>
    <div class="avatar" style="background:#e67e22;">🐺</div>
    <div class="player-name">Haoze (我)</div>
    <div class="player-chips-text" id="p1chips">$1,000</div>
  </div>

  <!-- Player 2 (top) -->
  <div class="player" id="p2" style="top:8%; left:50%;">
    <div class="player-cards">
      <div class="card down" style="transform:rotate(-3deg);"></div>
      <div class="card down" style="transform:rotate(3deg);"></div>
    </div>
    <div class="avatar" style="background:#3498db;">🦊</div>
    <div class="player-name">Alex</div>
    <div class="player-chips-text" id="p2chips">$1,000</div>
  </div>

  <!-- Player 3 (left) -->
  <div class="player" id="p3" style="top:45%; left:6%;">
    <div class="player-cards">
      <div class="card down" style="transform:rotate(-3deg);"></div>
      <div class="card down" style="transform:rotate(3deg);"></div>
    </div>
    <div class="avatar" style="background:#9b59b6;">🐱</div>
    <div class="player-name">Jenny</div>
    <div class="player-chips-text" id="p3chips">$1,000</div>
  </div>

  <!-- Player 4 (right) -->
  <div class="player" id="p4" style="top:45%; left:94%;">
    <div class="player-cards">
      <div class="card down" style="transform:rotate(-3deg);"></div>
      <div class="card down" style="transform:rotate(3deg);"></div>
    </div>
    <div class="avatar" style="background:#1abc9c;">🐼</div>
    <div class="player-name">Mike</div>
    <div class="player-chips-text" id="p4chips">$1,000</div>
  </div>

  <!-- Bet areas (positioned between player and center) -->
  <div class="bet-area" id="bet1" style="top:62%; left:50%;"></div>
  <div class="bet-area" id="bet2" style="top:22%; left:50%;"></div>
  <div class="bet-area" id="bet3" style="top:42%; left:22%;"></div>
  <div class="bet-area" id="bet4" style="top:42%; left:78%;"></div>
</div>

<div class="controls">
  <button class="btn btn-reset" onclick="resetDemo()">重置</button>
  <button class="btn btn-call" onclick="step1_blinds()">1. 盲注</button>
  <button class="btn btn-call" onclick="step2_call()">2. P1 跟注</button>
  <button class="btn btn-raise" onclick="step3_raise()">3. P3 加注</button>
  <button class="btn btn-call" onclick="step4_allCall()">4. 全部跟注</button>
  <button class="btn btn-fold" onclick="step5_flop()">5. 翻牌</button>
  <button class="btn btn-fold" onclick="step6_fold()">6. P4 弃牌</button>
  <button class="btn btn-allin" onclick="step7_settle()">7. 结算(P1赢)</button>
</div>

<!-- Chip rain container -->
<div id="chipRain" style="position:fixed;inset:0;pointer-events:none;z-index:100;"></div>

<script>
// Seeded random for consistent chip scatter
function srand(seed) {
  const x = Math.sin(seed * 9301 + 49297) * 233280;
  return x - Math.floor(x);
}

// Break amount into chip denominations
function getChips(amount) {
  const chips = [];
  const denoms = [
    { value:1000, cls:'gold' },
    { value:100, cls:'black' },
    { value:25, cls:'green' },
    { value:5, cls:'red' },
    { value:1, cls:'blue' },
  ];
  let rem = amount;
  for (const d of denoms) {
    const count = Math.min(Math.floor(rem / d.value), 3);
    for (let i = 0; i < count; i++) chips.push(d.cls);
    rem -= count * d.value;
  }
  if (chips.length === 0 && amount > 0) chips.push('blue');
  return chips.slice(0, 6);
}

// Render scattered chips in a bet area
function renderBetChips(betEl, amount, seed, animate) {
  const chips = getChips(amount);
  const group = document.createElement('div');
  group.className = 'chip-group';

  chips.forEach((cls, i) => {
    const chip = document.createElement('div');
    chip.className = `chip ${cls}`;
    // Scatter position
    const rx = (srand(seed + i * 7) - 0.5) * 30;
    const ry = (srand(seed + i * 13) - 0.5) * 20;
    const rot = (srand(seed + i * 19) - 0.5) * 30;
    chip.style.left = `${20 + rx}px`;
    chip.style.top = `${10 + ry}px`;
    chip.style.transform = `rotate(${rot}deg)`;
    chip.style.zIndex = i;

    if (animate) {
      // Push from player direction
      const playerDir = betEl.dataset.dir || '0,-40';
      const [dx, dy] = playerDir.split(',');
      chip.style.setProperty('--from-x', `${dx}px`);
      chip.style.setProperty('--from-y', `${dy}px`);
      chip.style.animationDelay = `${i * 0.08}s`;
    }
    group.appendChild(chip);
  });

  // Amount label
  const label = document.createElement('div');
  label.className = 'bet-amount';
  label.textContent = amount.toLocaleString();

  betEl.innerHTML = '';
  betEl.appendChild(group);
  betEl.appendChild(label);

  if (animate) betEl.classList.add('pushing');
  setTimeout(() => betEl.classList.remove('pushing'), 600);
}

// Clear bet area
function clearBet(betEl) { betEl.innerHTML = ''; }

// Set push direction for each bet area (from player toward center)
// Direction: where the chips come FROM (player's side relative to bet area)
// P1 is below bet area → chips come from below (+y)
document.getElementById('bet1').dataset.dir = '0,60';
// P2 is above bet area → chips come from above (-y)
document.getElementById('bet2').dataset.dir = '0,-60';
// P3 is left of bet area → chips come from left (-x)
document.getElementById('bet3').dataset.dir = '-60,0';
// P4 is right of bet area → chips come from right (+x)
document.getElementById('bet4').dataset.dir = '60,0';

let potAmount = 0;

function setPot(amount) {
  potAmount = amount;
  const pot = document.getElementById('pot');
  pot.textContent = `POT ${amount.toLocaleString()}`;
  pot.style.opacity = amount > 0 ? '1' : '0';
}

function setLabel(text) {
  document.getElementById('stepLabel').textContent = text;
}

// ========== DEMO STEPS ==========

function resetDemo() {
  ['bet1','bet2','bet3','bet4'].forEach(id => clearBet(document.getElementById(id)));
  setPot(0);
  document.getElementById('community').innerHTML = '';
  document.getElementById('chipRain').innerHTML = '';
  ['p1','p2','p3','p4'].forEach(id => {
    document.getElementById(id).classList.remove('winner');
    document.getElementById(id).style.opacity = '1';
  });
  document.getElementById('p1').classList.add('active');
  document.getElementById('p1chips').textContent = '$1,000';
  document.getElementById('p2chips').textContent = '$1,000';
  document.getElementById('p3chips').textContent = '$1,000';
  document.getElementById('p4chips').textContent = '$1,000';
  setLabel('点击按钮开始演示');
}

function step1_blinds() {
  setLabel('1️⃣ 盲注: P3小盲10, P4大盲20 — 筹码推向桌面');
  // P3 posts SB = 10
  renderBetChips(document.getElementById('bet3'), 10, 30, true);
  document.getElementById('p3chips').textContent = '$990';
  // P4 posts BB = 20 (slight delay)
  setTimeout(() => {
    renderBetChips(document.getElementById('bet4'), 20, 40, true);
    document.getElementById('p4chips').textContent = '$980';
    setPot(30);
  }, 300);
}

function step2_call() {
  setLabel('2️⃣ P1(Haoze)跟注20 — 筹码从下方推出');
  renderBetChips(document.getElementById('bet1'), 20, 10, true);
  document.getElementById('p1chips').textContent = '$980';
  setPot(50);
  // P2 also calls
  setTimeout(() => {
    setLabel('2️⃣ P2(Alex)跟注20 — 筹码从上方推出');
    renderBetChips(document.getElementById('bet2'), 20, 20, true);
    document.getElementById('p2chips').textContent = '$980';
    setPot(70);
  }, 800);
}

function step3_raise() {
  setLabel('3️⃣ P3(Jenny)加注到60 — 追加筹码推出');
  renderBetChips(document.getElementById('bet3'), 60, 31, true);
  document.getElementById('p3chips').textContent = '$940';
  setPot(120);
}

function step4_allCall() {
  setLabel('4️⃣ 全部跟注60 — 各方筹码更新');
  // P1 calls to 60 (add 40 more)
  renderBetChips(document.getElementById('bet1'), 60, 11, true);
  document.getElementById('p1chips').textContent = '$940';

  setTimeout(() => {
    renderBetChips(document.getElementById('bet2'), 60, 21, true);
    document.getElementById('p2chips').textContent = '$940';
  }, 300);

  setTimeout(() => {
    renderBetChips(document.getElementById('bet4'), 60, 41, true);
    document.getElementById('p4chips').textContent = '$940';
    setPot(240);
  }, 600);
}

function step5_flop() {
  setLabel('5️⃣ 翻牌 — 所有下注筹码收入底池，公共牌翻出');

  // Animate all bet chips flying to pot center
  ['bet1','bet2','bet3','bet4'].forEach(id => {
    const el = document.getElementById(id);
    if (el.querySelector('.chip-group')) {
      // Calculate direction to pot
      const rect = el.getBoundingClientRect();
      const potRect = document.getElementById('pot').getBoundingClientRect();
      const dx = potRect.left - rect.left;
      const dy = potRect.top - rect.top;
      el.style.setProperty('--to-pot-x', `${dx}px`);
      el.style.setProperty('--to-pot-y', `${dy}px`);
      el.classList.add('to-pot');
    }
  });

  // After chips fly to pot, clear bet areas and show flop
  setTimeout(() => {
    ['bet1','bet2','bet3','bet4'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('to-pot');
      clearBet(el);
    });

    // Deal flop cards
    const comm = document.getElementById('community');
    const cards = [
      {rank:'A', suit:'♠', color:'black'},
      {rank:'K', suit:'♥', color:'red'},
      {rank:'7', suit:'♦', color:'red'},
    ];
    comm.innerHTML = '';
    cards.forEach((c, i) => {
      const div = document.createElement('div');
      div.className = `card up ${c.color}`;
      div.innerHTML = `<span class="rank">${c.rank}</span><span class="suit">${c.suit}</span>`;
      div.style.animation = `dealIn 0.4s ease-out ${i * 0.1}s both`;
      comm.appendChild(div);
    });
  }, 700);
}

function step6_fold() {
  setLabel('6️⃣ P4(Mike)弃牌 — 变灰，筹码保留在下注区');
  document.getElementById('p4').style.opacity = '0.35';
  // P4 cards fade
}

function step7_settle() {
  setLabel('7️⃣ 结算: P1(Haoze)赢! — 底池筹码飞向赢家 + 庆祝特效');

  const pot = document.getElementById('pot');
  const p1 = document.getElementById('p1');
  const p1rect = p1.getBoundingClientRect();
  const potRect = pot.getBoundingClientRect();
  const dx = p1rect.left + p1rect.width/2 - potRect.left - potRect.width/2;
  const dy = p1rect.top + p1rect.height/2 - potRect.top - potRect.height/2;

  pot.style.setProperty('--to-winner-x', `${dx}px`);
  pot.style.setProperty('--to-winner-y', `${dy}px`);
  pot.classList.add('collecting');

  // Spawn flying chip particles from pot to winner
  setTimeout(() => {
    const rainEl = document.getElementById('chipRain');
    rainEl.innerHTML = '';
    const colors = ['#ffd700','#c0392b','#27ae60','#2c3e50','#2980b9','#ff8c00'];

    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'chip-particle';
      p.style.background = colors[i % colors.length];
      p.style.left = `${potRect.left + potRect.width/2}px`;
      p.style.top = `${potRect.top + potRect.height/2}px`;

      // Spread in arc toward winner
      const spread = (Math.random() - 0.5) * 200;
      p.style.setProperty('--rain-x', `${dx + spread}px`);
      p.style.setProperty('--rain-y', `${dy + (Math.random() - 0.5) * 100}px`);
      p.style.setProperty('--rain-rot', `${Math.random() * 720 - 360}deg`);
      p.style.animationDelay = `${i * 0.05}s`;
      p.style.animationDuration = `${0.8 + Math.random() * 0.4}s`;

      rainEl.appendChild(p);
    }
  }, 200);

  // Winner glow
  setTimeout(() => {
    pot.classList.remove('collecting');
    pot.style.opacity = '0';
    p1.classList.remove('active');
    p1.classList.add('winner');
    document.getElementById('p1chips').textContent = '$1,180';
    setLabel('🏆 Haoze 赢得 $240!');
  }, 900);

  // Cleanup rain
  setTimeout(() => {
    document.getElementById('chipRain').innerHTML = '';
  }, 2500);
}

// Deal card animation
const style = document.createElement('style');
style.textContent = `
@keyframes dealIn {
  from { transform: translateY(-30px) scale(0.7); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}`;
document.head.appendChild(style);
</script>
</body>
</html>
