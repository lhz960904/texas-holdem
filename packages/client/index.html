<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ALL IN" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json" />
    <title>ALL IN</title>
  </head>
  <body class="overscroll-none">
    <div id="root">
      <!-- Inline loading skeleton — visible until React hydrates -->
      <div id="initial-loader" style="height:100dvh;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
        <div style="font-size:2.5rem">🃏</div>
        <div style="width:40px;height:40px;border:2px solid rgba(233,195,73,0.3);border-top-color:#e9c349;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {})
      }
    </script>
  </body>
</html>
